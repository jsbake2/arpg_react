<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="currentColor">
  <!-- Stylized wolf head + antlers -->
  <g stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" fill="currentColor">
    <!-- Antlers -->
    <path d="M 22 14 L 18 6 M 22 14 L 14 10 M 22 14 L 16 18" fill="none" stroke-width="2"/>
    <path d="M 42 14 L 46 6 M 42 14 L 50 10 M 42 14 L 48 18" fill="none" stroke-width="2"/>
    <!-- Wolf head silhouette -->
    <path d="M 32 16
             L 22 18
             L 16 26
             L 18 38
             L 24 48
             L 32 52
             L 40 48
             L 46 38
             L 48 26
             L 42 18 Z"
          stroke-width="2.5"/>
    <!-- Eyes (cutouts) -->
    <ellipse cx="26" cy="32" rx="2.5" ry="3" fill="#0a0604"/>
    <ellipse cx="38" cy="32" rx="2.5" ry="3" fill="#0a0604"/>
    <!-- Snout -->
    <path d="M 28 42 L 32 48 L 36 42 Z" fill="#0a0604"/>
  </g>
</svg>
