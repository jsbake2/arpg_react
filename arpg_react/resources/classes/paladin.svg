<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="currentColor">
  <!-- Shield with upright sword and central cross — classic paladin sigil -->
  <g stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" fill="currentColor">
    <!-- Shield silhouette: heater/kite with rounded shoulders, pointed bottom -->
    <path d="M 32 8
             L 14 14
             L 14 30
             Q 14 46 32 56
             Q 50 46 50 30
             L 50 14 Z"
          stroke-width="2.5"/>
    <!-- Inner shield bevel (thin highlight stroke) -->
    <path d="M 32 12
             L 18 17
             L 18 30
             Q 18 43 32 52
             Q 46 43 46 30
             L 46 17 Z"
          fill="#0a0604" stroke-width="1"/>

    <!-- Vertical sword — blade -->
    <path d="M 32 16 L 30 38 L 34 38 Z"
          stroke-width="1.5"/>
    <!-- Sword crossguard -->
    <rect x="24" y="38" width="16" height="3" rx="1"/>
    <!-- Sword grip -->
    <rect x="30.5" y="41" width="3" height="6"/>
    <!-- Sword pommel -->
    <circle cx="32" cy="49" r="2"/>

    <!-- Small radiant points around shield top — paladin holy aura -->
    <path d="M 32 5 L 32 9 M 22 8 L 24 11 M 42 8 L 40 11"
          fill="none" stroke-width="1.5"/>
  </g>
</svg>
