<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="currentColor">
  <!-- Hooded figure with arcane orb — warlock silhouette -->
  <g stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" fill="currentColor">
    <!-- Arcane orb floating above -->
    <circle cx="32" cy="14" r="5" stroke-width="2"/>
    <!-- Orb inner highlight (cutout) -->
    <circle cx="32" cy="14" r="2" fill="#0a0604"/>
    <!-- Aura lines around orb -->
    <path d="M 22 10 L 26 12 M 42 10 L 38 12 M 22 18 L 26 16 M 42 18 L 38 16"
          fill="none" stroke-width="1.6"/>

    <!-- Hooded shoulders/cloak — wide pyramidal silhouette -->
    <path d="M 32 22
             L 22 28
             L 14 56
             L 50 56
             L 42 28 Z"
          stroke-width="2.5"/>

    <!-- Hood opening (face cutout) — dark hollow with two glowing eyes -->
    <path d="M 32 24
             Q 24 26 24 36
             L 24 40
             Q 28 42 32 42
             Q 36 42 40 40
             L 40 36
             Q 40 26 32 24 Z"
          fill="#0a0604" stroke-width="1.5"/>
    <!-- Glowing eyes -->
    <circle cx="28" cy="34" r="1.5" fill="currentColor" stroke="none"/>
    <circle cx="36" cy="34" r="1.5" fill="currentColor" stroke="none"/>

    <!-- Pact rune on chest -->
    <path d="M 30 48 L 32 44 L 34 48 L 32 52 Z"
          fill="#0a0604" stroke-width="1.2"/>
  </g>
</svg>
