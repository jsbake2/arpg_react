<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ARPG React — Sign in</title>
<link rel="icon" type="image/x-icon" href="/brand/favicon.ico">
<link rel="stylesheet" href="/app.css">
</head>
<body class="auth-body">
  <main class="login-card">
    <img src="/brand/symbol_red_128.png" alt="" class="brand-glyph">
    <div class="brand-title">ARPG REACT</div>
    <div class="brand-sub">Rule editor &amp; auto-cast companion</div>

    <form id="loginForm" class="login-form">
      <label>USERNAME
        <input type="text" id="username" autocomplete="username" autofocus required>
      </label>
      <label>PASSWORD
        <input type="password" id="password" autocomplete="current-password" required>
      </label>
      <button type="submit" class="btn primary big">SIGN IN</button>
      <div class="error" id="loginError"></div>
    </form>
  </main>

  <script>
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const errBox = document.getElementById("loginError");
      errBox.textContent = "";
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({username, password}),
        });
        if (res.ok) {
          window.location.href = "/";
        } else {
          const body = await res.json().catch(() => ({}));
          errBox.textContent = body.detail || "Invalid credentials.";
        }
      } catch (err) {
        errBox.textContent = "Network error — try again.";
      }
    });
  </script>
</body>
</html>
